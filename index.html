<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento do servidor</title>

    <!-- ✅ Nome corrigido -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Monitoramento do servidor</h1>
</header>

<main>
    <section class="container">

        <div class="card" id="cpu-card">
            <h2>CPU</h2>
            <p><span id="cpu">0</span>%</p>
        </div>

        <div class="card" id="ram-card">
            <h2>Memória RAM</h2>
            <p><span id="ram">0</span> GB</p>
        </div>

        <div class="card" id="temp-card">
            <h2>Temperatura</h2>
            <p><span id="temp">0</span> °C</p>
        </div>

    </section>
</main>

<footer>
    <p>Atualização em tempo real</p>
</footer>

<script src="script.js"></script>

</body>
</html>
